# Overrides only — yazi merges prepend_keymap on top of its built-in defaults.

[mgr]
prepend_keymap = [
	# veyxov layout nav: i/e = prev/next, a = leave, h/o = enter (o loses "open"; use Enter)
	{ on = "i", run = "arrow prev", desc = "Previous file" },
	{ on = "e", run = "arrow next", desc = "Next file" },
	{ on = "a", run = "leave", desc = "Back to the parent directory" },
	{ on = "h", run = "enter", desc = "Enter the child directory" },
	{ on = "o", run = "enter", desc = "Enter the child directory" },

	{ on = "A", run = "create", desc = "Create a file (ends with / for directories)" },
	{ on = "t", run = "tab_create --current", desc = "Create a new tab with CWD" },
]

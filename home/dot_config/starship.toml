"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
command_timeout = 1000

format = """$directory$git_branch$git_status$nodejs$rust$dotnet$cmd_duration$character"""

[character]
success_symbol = '[❯](bold fg)'

[directory]
truncation_length = 4
style = 'bold cyan'

[git_branch]
symbol = ' '
style = 'bold purple'

[git_status]
style = 'bold yellow'

[nodejs]
symbol = ' '
format = '[$symbol($version )]($style)'

[rust]
symbol = ' '
format = '[$symbol($version )]($style)'

[dotnet]
symbol = '.NET '
format = '[$symbol($version )]($style)'

[cmd_duration]
min_time = 2000
format = 'took [$duration]($style) '
